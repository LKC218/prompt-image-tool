<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFFDF8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="version" content="2.4.0">
    <title>提示词管家</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icons/图标.svg">
    <style>
        @font-face {
            font-family: '乐米小熊日记体';
            src: url('./assets/fonts/乐米小熊日记体.ttf') format('truetype');
            font-display: swap;
        }
        .splash-screen {
            position: fixed;
            inset: 0;
            background: #FFFDF8;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.4s ease;
        }
        .splash-screen.splash-hide {
            opacity: 0;
            pointer-events: none;
        }
        .splash-content {
            text-align: center;
        }
        .splash-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
        }
        .splash-title {
            font-size: 20px;
            font-weight: 700;
            color: #1F1F24;
            font-family: '乐米小熊日记体', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        #pcApp { display: none; }
        #mobileApp { display: none; }
    </style>
</head>
<body>
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <img src="./assets/icons/图标.svg" alt="" class="splash-icon">
            <div class="splash-title">提示词管家</div>
        </div>
    </div>
    <div id="pcApp"></div>
    <div id="mobileApp"></div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
